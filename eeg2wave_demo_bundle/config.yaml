data:
  root: data/feis
  stage: thinking
  train_ratio: 0.8
  val_ratio: 0.1

audio:
  sample_rate: 16000
  duration_sec: 1.5
  n_samples: 24000

model:
  n_channels_eeg: 14
  eeg_len: 1280
  hidden_dim: 128
  t_latent: 40
  codebook_size: 512
  vq_beta: 0.25
  vq_decay: 0.99

train:
  batch_size: 32
  lr: 0.0003
  epochs: 200
  lambda_stft: 0.5
  lambda_vq: 0.1
  grad_clip: 1.0
  num_workers: 0
  seed: 7

output:
  root: outputs
