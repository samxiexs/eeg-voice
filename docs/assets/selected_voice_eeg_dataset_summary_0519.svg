<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Selected EEG-Voice Dataset Summary</title>
  <desc id="desc">Summary of 37 selected EEG-voice datasets by task family, model supervision axis, local audio coverage, and EEG acquisition diversity.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .panel { fill: #ffffff; stroke: #d9dee8; stroke-width: 1.2; rx: 12; }
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #172033; }
      .subtitle { font: 400 16px Arial, Helvetica, sans-serif; fill: #526071; }
      .h { font: 700 17px Arial, Helvetica, sans-serif; fill: #1b2435; }
      .label { font: 600 14px Arial, Helvetica, sans-serif; fill: #2d3748; }
      .small { font: 400 12px Arial, Helvetica, sans-serif; fill: #5b6778; }
      .num { font: 700 24px Arial, Helvetica, sans-serif; fill: #172033; }
      .axis { stroke: #c7cfdd; stroke-width: 1; }
      .bar-bg { fill: #eef2f7; }
      .english { fill: #2f6fed; }
      .mandarin { fill: #1f9d7a; }
      .controlled { fill: #d97706; }
      .aad { fill: #7c3aed; }
      .proxy { fill: #64748b; }
      .p0 { fill: #2563eb; }
      .p1 { fill: #0891b2; }
      .p2 { fill: #ea580c; }
      .p3 { fill: #6b7280; }
      .ok { fill: #16a34a; }
      .miss { fill: #dc2626; }
      .chip { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1; rx: 8; }
      .chiptext { font: 600 13px Arial, Helvetica, sans-serif; fill: #334155; }
      .line { stroke: #d8dee9; stroke-width: 1.2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760"/>
  <text class="title" x="56" y="58">Selected EEG-Voice Dataset Pool, 0519</text>
  <text class="subtitle" x="56" y="86">37 selected datasets supporting EEG tokenization, speech/voice attribute alignment, and voice/speaker retrieval.</text>

  <rect class="panel" x="56" y="120" width="360" height="250"/>
  <text class="h" x="84" y="154">Task Families</text>
  <text class="small" x="84" y="178">Counts follow the selected catalog grouping.</text>
  <g transform="translate(84 206)">
    <text class="label" x="0" y="0">English speech / decoding</text>
    <rect class="bar-bg" x="178" y="-14" width="130" height="18" rx="4"/>
    <rect class="english" x="178" y="-14" width="42" height="18" rx="4"/>
    <text class="small" x="318" y="0">12</text>

    <text class="label" x="0" y="42">Mandarin</text>
    <rect class="bar-bg" x="178" y="28" width="130" height="18" rx="4"/>
    <rect class="mandarin" x="178" y="28" width="42" height="18" rx="4"/>
    <text class="small" x="318" y="42">12</text>

    <text class="label" x="0" y="84">Cantonese</text>
    <rect class="bar-bg" x="178" y="70" width="130" height="18" rx="4"/>
    <rect class="controlled" x="178" y="70" width="7" height="18" rx="4"/>
    <text class="small" x="318" y="84">2</text>

    <text class="label" x="0" y="126">Controlled / proxy / music</text>
    <rect class="bar-bg" x="178" y="112" width="130" height="18" rx="4"/>
    <rect class="aad" x="178" y="112" width="39" height="18" rx="4"/>
    <text class="small" x="318" y="126">11</text>
  </g>

  <rect class="panel" x="460" y="120" width="360" height="250"/>
  <text class="h" x="488" y="154">Training Priority</text>
  <text class="small" x="488" y="178">P0/P1 drive training; P2/P3 test attributes and boundaries.</text>
  <g transform="translate(500 212)">
    <circle class="p0" cx="60" cy="60" r="54"/>
    <path class="p1" d="M60,60 L60,6 A54,54 0 0,1 113,70 Z"/>
    <path class="p2" d="M60,60 L113,70 A54,54 0 0,1 38,109 Z"/>
    <path class="p3" d="M60,60 L38,109 A54,54 0 0,1 60,6 Z"/>
    <circle fill="#fff" cx="60" cy="60" r="28"/>
    <text class="num" x="46" y="68">37</text>
  </g>
  <g transform="translate(638 214)">
    <rect class="p0" x="0" y="-10" width="12" height="12" rx="2"/><text class="label" x="22" y="1">P0 core: 13</text>
    <rect class="p1" x="0" y="28" width="12" height="12" rx="2"/><text class="label" x="22" y="39">P1 expansion: 10</text>
    <rect class="p2" x="0" y="66" width="12" height="12" rx="2"/><text class="label" x="22" y="77">P2 probes: 11</text>
    <rect class="p3" x="0" y="104" width="12" height="12" rx="2"/><text class="label" x="22" y="115">P3 auditory proxy: 3</text>
  </g>

  <rect class="panel" x="864" y="120" width="360" height="250"/>
  <text class="h" x="892" y="154">Local Audio Sample Coverage</text>
  <text class="small" x="892" y="178">This is an execution status, not the definition of research usability.</text>
  <g transform="translate(914 218)">
    <rect class="bar-bg" x="0" y="0" width="250" height="36" rx="8"/>
    <rect class="ok" x="0" y="0" width="149" height="36" rx="8"/>
    <text class="label" x="0" y="66">Complete local audio</text>
    <text class="num" x="206" y="31">22</text>
    <rect class="bar-bg" x="0" y="100" width="250" height="36" rx="8"/>
    <rect class="miss" x="0" y="100" width="101" height="36" rx="8"/>
    <text class="label" x="0" y="166">No playable local audio yet</text>
    <text class="num" x="206" y="131">15</text>
  </g>

  <rect class="panel" x="56" y="410" width="548" height="270"/>
  <text class="h" x="84" y="444">Supervision Axes For EEGVoiceTokenV1</text>
  <text class="small" x="84" y="468">Each axis is supported by multiple datasets rather than one isolated benchmark.</text>
  <g transform="translate(88 504)">
    <rect class="chip" x="0" y="0" width="150" height="38"/><text class="chiptext" x="18" y="24">Content / phoneme</text>
    <line class="line" x1="150" y1="19" x2="226" y2="19"/>
    <rect class="chip" x="226" y="0" width="230" height="38"/><text class="chiptext" x="244" y="24">ds006104, Kara One, FEIS</text>

    <rect class="chip" x="0" y="54" width="150" height="38"/><text class="chiptext" x="18" y="78">Pitch / prosody</text>
    <line class="line" x1="150" y1="73" x2="226" y2="73"/>
    <rect class="chip" x="226" y="54" width="230" height="38"/><text class="chiptext" x="244" y="78">LPPHK, CIRE, tone ERP</text>

    <rect class="chip" x="0" y="108" width="150" height="38"/><text class="chiptext" x="18" y="132">Voice / speaker</text>
    <line class="line" x1="150" y1="127" x2="226" y2="127"/>
    <rect class="chip" x="226" y="108" width="230" height="38"/><text class="chiptext" x="244" y="132">AAD, multi-talker, KUL/DTU</text>

    <rect class="chip" x="0" y="162" width="150" height="38"/><text class="chiptext" x="18" y="186">Mode / transfer</text>
    <line class="line" x1="150" y1="181" x2="226" y2="181"/>
    <rect class="chip" x="226" y="162" width="230" height="38"/><text class="chiptext" x="244" y="186">overt, imagined, inner</text>
  </g>

  <rect class="panel" x="648" y="410" width="576" height="270"/>
  <text class="h" x="676" y="444">Acquisition Diversity</text>
  <text class="small" x="676" y="468">Device variation is a modeling condition, not noise to be ignored.</text>
  <g transform="translate(680 506)">
    <text class="label" x="0" y="0">Channel count range</text>
    <line class="axis" x1="0" y1="28" x2="470" y2="28"/>
    <circle class="controlled" cx="0" cy="28" r="7"/><text class="small" x="-8" y="52">14</text>
    <circle class="english" cx="94" cy="28" r="7"/><text class="small" x="86" y="52">64</text>
    <circle class="aad" cx="214" cy="28" r="7"/><text class="small" x="202" y="52">128</text>
    <circle class="proxy" cx="470" cy="28" r="7"/><text class="small" x="458" y="52">255</text>

    <text class="label" x="0" y="100">Sampling rate span</text>
    <line class="axis" x1="0" y1="128" x2="470" y2="128"/>
    <circle class="proxy" cx="0" cy="128" r="7"/><text class="small" x="-12" y="152">128</text>
    <circle class="mandarin" cx="83" cy="128" r="7"/><text class="small" x="72" y="152">500</text>
    <circle class="english" cx="135" cy="128" r="7"/><text class="small" x="122" y="152">1000</text>
    <circle class="p2" cx="470" cy="128" r="7"/><text class="small" x="452" y="152">8192</text>

    <text class="small" x="0" y="206">BioSemi, Brain Products, ANT Neuro, g.tec/Pangolin, Neuroscan, EGI, SynAmps, scalp/around-ear/in-ear EEG</text>
  </g>
</svg>
