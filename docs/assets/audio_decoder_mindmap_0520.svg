<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1040" viewBox="0 0 1680 1040">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #475569; }
      .section { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .body { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #334155; }
      .small { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #64748b; }
      .paper { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #1e293b; }
      .label { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 10; }
      .wave { fill: #111827; stroke: #111827; stroke-width: 1.4; rx: 14; }
      .bundle { fill: #f0fdfa; stroke: #14b8a6; stroke-width: 1.6; rx: 12; }
      .align { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.6; rx: 12; }
      .decoder { fill: #fff7ed; stroke: #f97316; stroke-width: 1.6; rx: 12; }
      .render { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.6; rx: 12; }
      .semantic { fill: #eef2ff; stroke: #6366f1; stroke-width: 1.3; rx: 10; }
      .prosody { fill: #ecfdf5; stroke: #10b981; stroke-width: 1.3; rx: 10; }
      .voice { fill: #fffbeb; stroke: #f59e0b; stroke-width: 1.3; rx: 10; }
      .codec { fill: #fef2f2; stroke: #ef4444; stroke-width: 1.3; rx: 10; }
      .dash { stroke: #94a3b8; stroke-width: 1.8; stroke-dasharray: 6 6; fill: none; marker-end: url(#arrow); }
      .line { stroke: #334155; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #64748b; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .pillSemantic { fill: #4f46e5; rx: 6; }
      .pillProsody { fill: #059669; rx: 6; }
      .pillVoice { fill: #d97706; rx: 6; }
      .pillCodec { fill: #dc2626; rx: 6; }
    </style>
  </defs>

  <rect width="1680" height="1040" class="bg"/>
  <text x="54" y="62" class="title">Audio Decoder and Audio Token Foundation Roadmap</text>
  <text x="56" y="92" class="subtitle">Token-first view for V2/V3: audio waveform is decomposed into semantic, prosody, voice, and codec tokens before EEG-token alignment or waveform decoding.</text>

  <rect x="60" y="430" width="190" height="112" class="wave"/>
  <text x="155" y="472" text-anchor="middle" class="label" style="font-size:18px">Audio waveform</text>
  <text x="155" y="500" text-anchor="middle" class="label">speech / voice / sound</text>
  <text x="155" y="525" text-anchor="middle" class="small" fill="#d1d5db">raw waveform input</text>

  <path d="M250 486 L324 486" class="line"/>

  <rect x="324" y="140" width="330" height="160" class="semantic"/>
  <rect x="346" y="164" width="88" height="24" class="pillSemantic"/>
  <text x="390" y="181" text-anchor="middle" class="label">semantic</text>
  <text x="348" y="214" class="section">SSL semantic tokenizer</text>
  <text x="348" y="244" class="paper">HuBERT / wav2vec 2.0 / WavLM / Whisper</text>
  <text x="348" y="271" class="body">phoneme, syllable, word-like speech units</text>

  <rect x="324" y="330" width="330" height="146" class="prosody"/>
  <rect x="346" y="354" width="82" height="24" class="pillProsody"/>
  <text x="387" y="371" text-anchor="middle" class="label">prosody</text>
  <text x="348" y="404" class="section">Prosody tokenizer</text>
  <text x="348" y="433" class="paper">F0 / energy / rhythm / envelope / voicing</text>
  <text x="348" y="459" class="body">pitch, intensity, speaking rate, stress</text>

  <rect x="324" y="506" width="330" height="146" class="voice"/>
  <rect x="346" y="530" width="62" height="24" class="pillVoice"/>
  <text x="377" y="547" text-anchor="middle" class="label">voice</text>
  <text x="348" y="580" class="section">Voice tokenizer</text>
  <text x="348" y="609" class="paper">speaker / timbre / style embedding</text>
  <text x="348" y="635" class="body">speaker identity and vocal quality</text>

  <rect x="324" y="682" width="330" height="168" class="codec"/>
  <rect x="346" y="706" width="64" height="24" class="pillCodec"/>
  <text x="378" y="723" text-anchor="middle" class="label">codec</text>
  <text x="348" y="756" class="section">Codec tokenizer</text>
  <text x="348" y="785" class="paper">SoundStream / EnCodec / RVQGAN</text>
  <text x="348" y="811" class="paper">FACodec / X-Codec / ESC</text>
  <text x="348" y="837" class="body">coarse acoustic code plus residual detail</text>

  <path d="M250 486 C284 486, 290 220, 324 220" class="soft"/>
  <path d="M250 486 C286 486, 292 403, 324 403" class="soft"/>
  <path d="M250 486 C286 486, 292 579, 324 579" class="soft"/>
  <path d="M250 486 C284 486, 290 766, 324 766" class="soft"/>

  <rect x="760" y="325" width="276" height="250" class="bundle"/>
  <text x="898" y="362" text-anchor="middle" class="section">AudioTokenBundle</text>
  <text x="792" y="402" class="body">content_units</text>
  <text x="792" y="431" class="body">prosody_tokens</text>
  <text x="792" y="460" class="body">voice_tokens</text>
  <text x="792" y="489" class="body">codec_codes</text>
  <text x="792" y="518" class="body">frame_times / masks</text>
  <text x="792" y="548" class="small">single file-level interface for V2/V3</text>

  <path d="M654 220 C700 220, 714 366, 760 376" class="line"/>
  <path d="M654 403 L760 429" class="line"/>
  <path d="M654 579 C706 579, 720 500, 760 489" class="line"/>
  <path d="M654 766 C716 766, 730 542, 760 528" class="line"/>

  <rect x="1140" y="182" width="380" height="180" class="align"/>
  <text x="1330" y="220" text-anchor="middle" class="section">EEG-token alignment target</text>
  <text x="1172" y="260" class="paper">Primary alignment</text>
  <text x="1172" y="288" class="body">semantic + prosody + voice tokens</text>
  <text x="1172" y="322" class="paper">Avoid direct supervision</text>
  <text x="1172" y="350" class="body">full residual codec codebook</text>

  <rect x="1140" y="430" width="380" height="210" class="decoder"/>
  <text x="1330" y="468" text-anchor="middle" class="section">Audio token LM / voice decoder</text>
  <text x="1172" y="508" class="paper">AudioLM / SoundStorm</text>
  <text x="1172" y="536" class="paper">VALL-E / VoiceCraft / MaskGCT</text>
  <text x="1172" y="564" class="paper">Voicebox / AudioPaLM / Moshi</text>
  <text x="1172" y="604" class="body">complete acoustic detail from high-level token conditions</text>

  <rect x="1140" y="720" width="380" height="150" class="render"/>
  <text x="1330" y="758" text-anchor="middle" class="section">Waveform renderer</text>
  <text x="1172" y="800" class="paper">codec decoder / acoustic decoder</text>
  <text x="1172" y="830" class="body">V3 endpoint, not V2 alignment metric</text>

  <path d="M1036 426 C1080 380, 1090 280, 1140 272" class="line"/>
  <path d="M1036 486 L1140 530" class="line"/>
  <path d="M1330 640 L1330 720" class="line"/>

  <path d="M1168 360 C1120 688, 888 868, 676 806" class="dash"/>
  <text x="788" y="880" class="small">Only coarse or factorized codec groups are alignment candidates; residual codec layers stay decoder-side.</text>

  <rect x="68" y="914" width="1544" height="76" class="box"/>
  <text x="96" y="948" class="section">Roadmap reading</text>
  <text x="96" y="977" class="body">V2 validates whether EEG tokens align with interpretable audio tokens. V3 hands those conditions to an audio foundation decoder that completes codec detail and renders waveform.</text>
</svg>
