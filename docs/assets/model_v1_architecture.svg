<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">EEGVoiceTokenV1 component architecture</title>
  <desc id="desc">A scientific block diagram showing EEG preprocessing, acquisition device context, sensor-aware temporal encoding, latent token forming, hierarchical grouped RVQ, routed alignment heads, reconstruction views, and retrieval.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#24364b"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d6f9f"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9b3a3a"/>
    </marker>
    <style>
      .bg { fill: #f7f9fb; }
      .panel { fill: #ffffff; stroke: #d5dde7; stroke-width: 1.5; rx: 16; }
      .panel-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2d3d; letter-spacing: .2px; }
      .caption { font: 13px Arial, Helvetica, sans-serif; fill: #536271; }
      .box { fill: #ffffff; stroke: #8393a5; stroke-width: 1.4; rx: 11; }
      .box-blue { fill: #eaf4fb; stroke: #3d7ea6; }
      .box-green { fill: #ecf7f0; stroke: #4d8f63; }
      .box-yellow { fill: #fff6dc; stroke: #b9892b; }
      .box-purple { fill: #f1eef9; stroke: #735ba7; }
      .box-red { fill: #fff0ee; stroke: #a5534b; }
      .box-gray { fill: #f3f5f7; stroke: #8c98a6; }
      .label { font: 700 16px Arial, Helvetica, sans-serif; fill: #1f2d3d; }
      .small { font: 13px Arial, Helvetica, sans-serif; fill: #334455; }
      .tiny { font: 12px Arial, Helvetica, sans-serif; fill: #536271; }
      .code { font: 700 13px "SFMono-Regular", Consolas, monospace; fill: #1f2d3d; }
      .arrow { fill: none; stroke: #24364b; stroke-width: 2.1; marker-end: url(#arrow); }
      .arrow-blue { fill: none; stroke: #2d6f9f; stroke-width: 2.1; marker-end: url(#arrow-blue); }
      .arrow-red { fill: none; stroke: #9b3a3a; stroke-width: 2.1; marker-end: url(#arrow-red); }
      .arrow-soft { fill: none; stroke: #8794a3; stroke-width: 1.7; marker-end: url(#arrow); opacity: .75; }
      .dashed { stroke-dasharray: 7 6; }
      .panel-letter { font: 700 22px Arial, Helvetica, sans-serif; fill: #24364b; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="920"/>

  <text class="panel-letter" x="44" y="48">A</text>
  <text class="panel-title" x="77" y="48">EEGVoiceTokenV1: token foundation and retrieval architecture</text>
  <text class="caption" x="77" y="73">V1 uses grouped discrete EEG tokens for attribute alignment and voice/speaker retrieval; device context handles acquisition differences and q7 is restricted to weak residual reconstruction.</text>

  <rect class="panel" x="40" y="100" width="1520" height="330"/>
  <text class="panel-title" x="68" y="135">Neural signal encoder and token bottleneck</text>

  <rect class="box box-gray" x="70" y="185" width="150" height="84"/>
  <text class="label" x="95" y="215">EEG batch</text>
  <text class="code" x="95" y="242">[B, C, T]</text>

  <rect class="box box-blue" x="270" y="174" width="185" height="106"/>
  <text class="label" x="296" y="207">Preprocess</text>
  <text class="small" x="296" y="232">window / z-score</text>
  <text class="small" x="296" y="254">resample / filter</text>

  <rect class="box box-blue" x="505" y="174" width="205" height="106"/>
  <text class="label" x="532" y="207">Sensor encoder</text>
  <text class="small" x="532" y="232">montage + positions</text>
  <text class="small" x="532" y="254">channel mask</text>

  <rect class="box box-blue" x="760" y="174" width="235" height="106"/>
  <text class="label" x="792" y="207">Temporal encoder</text>
  <text class="small" x="792" y="232">multi-scale Conv</text>
  <text class="small" x="792" y="254">Transformer blocks</text>

  <rect class="box box-green" x="1045" y="174" width="210" height="106"/>
  <text class="label" x="1071" y="207">Latent token former</text>
  <text class="small" x="1071" y="232">learned queries</text>
  <text class="code" x="1071" y="254">Q = 32</text>

  <rect class="box box-yellow" x="1305" y="174" width="210" height="106"/>
  <text class="label" x="1332" y="207">Grouped RVQ</text>
  <text class="small" x="1332" y="232">8 quantizers</text>
  <text class="code" x="1332" y="254">q0 ... q7</text>

  <path class="arrow" d="M 220 227 L 264 227"/>
  <path class="arrow" d="M 455 227 L 499 227"/>
  <path class="arrow" d="M 710 227 L 754 227"/>
  <path class="arrow" d="M 995 227 L 1039 227"/>
  <path class="arrow" d="M 1255 227 L 1299 227"/>

  <rect class="box box-gray" x="270" y="320" width="270" height="62"/>
  <text class="label" x="294" y="346">Metadata</text>
  <text class="small" x="294" y="369">dataset_id / language / domain_group</text>

  <rect class="box box-purple" x="590" y="320" width="235" height="62"/>
  <text class="label" x="614" y="346">Dataset adapter</text>
  <text class="small" x="614" y="369">FiLM or LayerNorm affine</text>

  <path class="arrow-soft" d="M 540 351 L 584 351"/>

  <rect class="box box-gray" x="875" y="320" width="250" height="62"/>
  <text class="label" x="899" y="346">Device metadata</text>
  <text class="small" x="899" y="369">device / montage / Fs / channels</text>

  <rect class="box box-purple" x="1175" y="320" width="260" height="62"/>
  <text class="label" x="1199" y="346">Device context</text>
  <text class="small" x="1199" y="369">condition sensor + latent tokens</text>

  <path class="arrow-soft" d="M 1125 351 L 1169 351"/>
  <path class="arrow-soft dashed" d="M 1305 320 C 1170 286, 865 286, 710 227"/>
  <path class="arrow-soft dashed" d="M 1305 320 C 1235 292, 1185 277, 1150 280"/>

  <rect class="panel" x="40" y="470" width="1520" height="390"/>
  <text class="panel-title" x="68" y="505">Grouped token semantics, head routing, and output spaces</text>

  <rect class="box box-green" x="70" y="565" width="180" height="86"/>
  <text class="label" x="100" y="594">q0-q1</text>
  <text class="small" x="100" y="618">base auditory</text>
  <text class="tiny" x="100" y="638">onset / envelope</text>

  <rect class="box box-green" x="280" y="565" width="180" height="86"/>
  <text class="label" x="310" y="594">q2-q3</text>
  <text class="small" x="310" y="618">content</text>
  <text class="tiny" x="310" y="638">phoneme / word</text>

  <rect class="box box-green" x="490" y="565" width="180" height="86"/>
  <text class="label" x="530" y="594">q4</text>
  <text class="small" x="530" y="618">prosody</text>
  <text class="tiny" x="530" y="638">F0 / intensity</text>

  <rect class="box box-green" x="700" y="565" width="180" height="86"/>
  <text class="label" x="730" y="594">q5-q6</text>
  <text class="small" x="730" y="618">voice</text>
  <text class="tiny" x="730" y="638">speaker / style</text>

  <rect class="box box-red" x="910" y="565" width="180" height="86"/>
  <text class="label" x="956" y="594">q7</text>
  <text class="small" x="956" y="618">residual</text>
  <text class="tiny" x="956" y="638">nuisance only</text>

  <rect class="box box-blue" x="1115" y="520" width="185" height="60"/>
  <text class="label" x="1140" y="545">Content head</text>
  <text class="tiny" x="1140" y="566">base + content</text>

  <rect class="box box-blue" x="1115" y="595" width="185" height="60"/>
  <text class="label" x="1140" y="620">Prosody head</text>
  <text class="tiny" x="1140" y="641">base + prosody</text>

  <rect class="box box-blue" x="1115" y="670" width="185" height="60"/>
  <text class="label" x="1140" y="695">Voice head</text>
  <text class="tiny" x="1140" y="716">base + voice</text>

  <rect class="box box-purple" x="1115" y="745" width="185" height="60"/>
  <text class="label" x="1140" y="770">Mode head</text>
  <text class="tiny" x="1140" y="791">adapter + q0-q6</text>

  <rect class="box box-yellow" x="1345" y="520" width="170" height="60"/>
  <text class="label" x="1370" y="545">Phoneme</text>
  <text class="tiny" x="1370" y="566">content labels</text>

  <rect class="box box-yellow" x="1345" y="595" width="170" height="60"/>
  <text class="label" x="1370" y="620">F0 / rhythm</text>
  <text class="tiny" x="1370" y="641">prosody probes</text>

  <rect class="box box-yellow" x="1345" y="670" width="170" height="60"/>
  <text class="label" x="1370" y="695">Retrieval</text>
  <text class="code" x="1370" y="716">[B, B+K]</text>

  <rect class="box box-yellow" x="1345" y="745" width="170" height="60"/>
  <text class="label" x="1370" y="770">Mode logits</text>
  <text class="tiny" x="1370" y="791">heard / overt / inner</text>

  <path class="arrow-blue" d="M 250 591 C 520 505, 835 506, 1110 550"/>
  <path class="arrow-blue" d="M 460 605 C 665 520, 900 520, 1110 550"/>
  <path class="arrow-blue" d="M 250 612 C 530 640, 835 640, 1110 625"/>
  <path class="arrow-blue" d="M 670 608 C 810 625, 960 625, 1110 625"/>
  <path class="arrow-blue" d="M 250 629 C 530 700, 835 705, 1110 700"/>
  <path class="arrow-blue" d="M 880 608 C 965 655, 1028 682, 1110 700"/>
  <path class="arrow-blue" d="M 250 640 C 520 765, 820 780, 1110 775"/>
  <path class="arrow-blue" d="M 880 635 C 995 710, 1045 747, 1110 775"/>

  <path class="arrow" d="M 1300 550 L 1339 550"/>
  <path class="arrow" d="M 1300 625 L 1339 625"/>
  <path class="arrow" d="M 1300 700 L 1339 700"/>
  <path class="arrow" d="M 1300 775 L 1339 775"/>

  <rect class="box box-gray" x="70" y="720" width="220" height="70"/>
  <text class="label" x="96" y="748">Aligned decoder</text>
  <text class="code" x="96" y="771">recon_aligned(q0-q6)</text>

  <rect class="box box-red" x="345" y="720" width="220" height="70"/>
  <text class="label" x="371" y="748">Full decoder</text>
  <text class="code" x="371" y="771">recon_full(q0-q7)</text>

  <path class="arrow-soft" d="M 705 651 C 560 680, 410 715, 293 748"/>
  <path class="arrow-red dashed" d="M 1000 651 C 840 690, 680 720, 569 748"/>

  <line x1="1068" y1="558" x2="1110" y2="558" stroke="#9b3a3a" stroke-width="2" stroke-dasharray="7 6"/>
  <text class="tiny" x="922" y="695" fill="#9b3a3a">q7 is excluded from alignment, mode, and retrieval heads</text>
</svg>
