<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">EEGVoiceTokenV1 implementation status map</title>
  <desc id="desc">A development status diagram showing the implemented V1 model skeleton and the remaining real-data training system components.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2a3a4e"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #1f2d3d; }
      .subtitle { font: 14px Arial, Helvetica, sans-serif; fill: #5f6d7a; }
      .panel { fill: #ffffff; stroke: #d5dde7; stroke-width: 1.4; rx: 16; }
      .done { fill: #eaf6ee; stroke: #4d8f63; stroke-width: 1.5; rx: 12; }
      .partial { fill: #fff5d9; stroke: #b9892b; stroke-width: 1.5; rx: 12; }
      .todo { fill: #f2f5f8; stroke: #8c98a6; stroke-width: 1.4; rx: 12; }
      .core { fill: #eaf4fb; stroke: #3d7ea6; stroke-width: 1.5; rx: 12; }
      .label { font: 700 16px Arial, Helvetica, sans-serif; fill: #1f2d3d; }
      .small { font: 13px Arial, Helvetica, sans-serif; fill: #435365; }
      .tiny { font: 12px Arial, Helvetica, sans-serif; fill: #5f6d7a; }
      .code { font: 700 12px "SFMono-Regular", Consolas, monospace; fill: #1f2d3d; }
      .axis { font: 700 15px Arial, Helvetica, sans-serif; fill: #26384c; }
      .arrow { fill: none; stroke: #2a3a4e; stroke-width: 2; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #8c98a6; stroke-width: 1.7; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .divider { stroke: #dbe2ea; stroke-width: 1.2; }
    </style>
  </defs>

  <rect class="bg" width="1500" height="900"/>
  <text class="title" x="52" y="55">C. EEGVoiceTokenV1 development map: implemented model core and pending data system</text>
  <text class="subtitle" x="52" y="82">The current code path is a validated synthetic-batch model skeleton. Real selected-dataset training requires the lower data and evaluation layers.</text>

  <rect class="panel" x="48" y="115" width="1404" height="215"/>
  <text class="axis" x="76" y="150">Implemented model path</text>

  <rect class="done" x="82" y="185" width="150" height="88"/>
  <text class="label" x="105" y="216">Config</text>
  <text class="code" x="105" y="241">model_v1.yaml</text>

  <rect class="core" x="275" y="185" width="190" height="88"/>
  <text class="label" x="302" y="216">Tokenizer</text>
  <text class="small" x="302" y="241">sensor encoder + LTF</text>

  <rect class="core" x="510" y="185" width="190" height="88"/>
  <text class="label" x="537" y="216">Grouped RVQ</text>
  <text class="code" x="537" y="241">q0 ... q7</text>

  <rect class="core" x="745" y="185" width="190" height="88"/>
  <text class="label" x="772" y="216">Heads</text>
  <text class="small" x="772" y="241">alignment + mode</text>

  <rect class="core" x="980" y="185" width="190" height="88"/>
  <text class="label" x="1007" y="216">Retrieval</text>
  <text class="code" x="1007" y="241">[B, B+K]</text>

  <rect class="done" x="1215" y="185" width="190" height="88"/>
  <text class="label" x="1242" y="216">Synthetic tests</text>
  <text class="small" x="1242" y="241">3 passing tests</text>

  <path class="arrow" d="M 232 229 L 269 229"/>
  <path class="arrow" d="M 465 229 L 504 229"/>
  <path class="arrow" d="M 700 229 L 739 229"/>
  <path class="arrow" d="M 935 229 L 974 229"/>
  <path class="arrow" d="M 1170 229 L 1209 229"/>

  <rect class="panel" x="48" y="370" width="1404" height="300"/>
  <text class="axis" x="76" y="405">Current public interfaces</text>

  <rect class="done" x="82" y="438" width="300" height="178"/>
  <text class="label" x="110" y="470">EEGVoiceBatch</text>
  <text class="small" x="110" y="498">eeg, sensor_pos, channel_mask</text>
  <text class="small" x="110" y="522">dataset_id, language, domain_group</text>
  <text class="small" x="110" y="546">speaker_id, audio_embedding</text>
  <text class="small" x="110" y="570">targets, sensor_type</text>

  <rect class="done" x="430" y="438" width="300" height="178"/>
  <text class="label" x="458" y="470">VoiceAlignmentTargets</text>
  <text class="small" x="458" y="498">content / phoneme labels</text>
  <text class="small" x="458" y="522">pitch / prosody targets</text>
  <text class="small" x="458" y="546">timbre / style targets</text>
  <text class="small" x="458" y="570">mode labels</text>

  <rect class="done" x="778" y="438" width="300" height="178"/>
  <text class="label" x="806" y="470">GroupedRVQOutput</text>
  <text class="small" x="806" y="498">tokens, group_tokens</text>
  <text class="small" x="806" y="522">group_latents, z_q</text>
  <text class="small" x="806" y="546">commitment loss</text>
  <text class="small" x="806" y="570">token metrics</text>

  <rect class="done" x="1126" y="438" width="280" height="178"/>
  <text class="label" x="1154" y="470">Forward output</text>
  <text class="small" x="1154" y="498">recon_aligned / recon_full</text>
  <text class="small" x="1154" y="522">logits and predictions</text>
  <text class="small" x="1154" y="546">losses and metrics</text>
  <text class="small" x="1154" y="570">q7 diagnostics</text>

  <line class="divider" x1="48" y1="705" x2="1452" y2="705"/>
  <text class="axis" x="76" y="745">Pending real-data training system</text>

  <rect class="partial" x="82" y="775" width="190" height="72"/>
  <text class="label" x="108" y="803">DatasetRegistry</text>
  <text class="tiny" x="108" y="827">selected datasets</text>

  <rect class="todo" x="315" y="775" width="190" height="72"/>
  <text class="label" x="341" y="803">Collator</text>
  <text class="tiny" x="341" y="827">real EEG/audio batches</text>

  <rect class="todo" x="548" y="775" width="190" height="72"/>
  <text class="label" x="574" y="803">Targets</text>
  <text class="tiny" x="574" y="827">phoneme/F0/style</text>

  <rect class="todo" x="781" y="775" width="190" height="72"/>
  <text class="label" x="807" y="803">Sampler</text>
  <text class="tiny" x="807" y="827">English-first mix</text>

  <rect class="todo" x="1014" y="775" width="190" height="72"/>
  <text class="label" x="1040" y="803">Training loop</text>
  <text class="tiny" x="1040" y="827">smoke to pretrain</text>

  <rect class="todo" x="1247" y="775" width="190" height="72"/>
  <text class="label" x="1273" y="803">Evaluation</text>
  <text class="tiny" x="1273" y="827">Recall@K / probes</text>

  <path class="dash" d="M 272 811 L 309 811"/>
  <path class="dash" d="M 505 811 L 542 811"/>
  <path class="dash" d="M 738 811 L 775 811"/>
  <path class="dash" d="M 971 811 L 1008 811"/>
  <path class="dash" d="M 1204 811 L 1241 811"/>
</svg>
