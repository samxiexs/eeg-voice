<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="650" viewBox="0 0 1360 650">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #111827; stroke-width: 1.4; rx: 8; }
      .dark { fill: #111827; stroke: #111827; stroke-width: 1.4; rx: 8; }
      .blue { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 1.4; rx: 8; }
      .green { fill: #ecfdf5; stroke: #047857; stroke-width: 1.4; rx: 8; }
      .orange { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.4; rx: 8; }
      .text { font-family: Arial, Helvetica, sans-serif; font-size: 17px; fill: #111827; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #374151; }
      .white { font-family: Arial, Helvetica, sans-serif; font-size: 17px; fill: #ffffff; }
      .arrow { stroke: #111827; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#111827" />
    </marker>
  </defs>

  <text x="40" y="42" class="text" font-weight="700">Token-Centric EEG Voice Model v0.1</text>
  <text x="40" y="66" class="small">Main path: EEG to discrete tokens. Voice branches are downstream probes and alignment heads.</text>

  <rect x="40" y="125" width="150" height="82" class="dark"/>
  <text x="62" y="158" class="white">EEG</text>
  <text x="62" y="184" class="white">[B,C,T]</text>

  <rect x="230" y="108" width="190" height="116" class="box"/>
  <text x="252" y="140" class="text">Normalize + unfold</text>
  <text x="252" y="166" class="small">2 s windows</text>
  <text x="252" y="188" class="small">optional overlap</text>

  <rect x="455" y="108" width="205" height="116" class="blue"/>
  <text x="477" y="140" class="text">SEANet encoder</text>
  <text x="477" y="166" class="small">dilated residual convs</text>
  <text x="477" y="188" class="small">per channel/window</text>

  <rect x="230" y="280" width="190" height="102" class="green"/>
  <text x="252" y="312" class="text">SensorEmbedding</text>
  <text x="252" y="338" class="small">position + type</text>
  <text x="252" y="360" class="small">topology-aware</text>

  <rect x="700" y="108" width="235" height="138" class="blue"/>
  <text x="722" y="140" class="text">LatentQueryAggregator</text>
  <text x="722" y="166" class="small">32 neural queries</text>
  <text x="722" y="188" class="small">BackwardSolution</text>
  <text x="722" y="210" class="small">temporal self-attention</text>

  <rect x="980" y="108" width="200" height="116" class="orange"/>
  <text x="1002" y="140" class="text">RVQ tokenizer</text>
  <text x="1002" y="166" class="small">8 quantizers</text>
  <text x="1002" y="188" class="small">1024 codes each</text>

  <rect x="980" y="278" width="200" height="102" class="box"/>
  <text x="1002" y="310" class="text">EEG decoder</text>
  <text x="1002" y="336" class="small">reconstruction check</text>
  <text x="1002" y="358" class="small">not voice generation</text>

  <rect x="700" y="330" width="235" height="104" class="dark"/>
  <text x="722" y="362" class="white">Discrete EEG tokens</text>
  <text x="722" y="388" class="white">[B,32,S,8]</text>
  <text x="722" y="410" class="white">primary output</text>

  <rect x="70" y="500" width="205" height="92" class="box"/>
  <text x="92" y="532" class="text">TokenMetrics</text>
  <text x="92" y="558" class="small">usage / perplexity</text>
  <text x="92" y="580" class="small">dead-code ratio</text>

  <rect x="315" y="500" width="205" height="92" class="box"/>
  <text x="337" y="532" class="text">PhonemeSequenceHead</text>
  <text x="337" y="558" class="small">phoneme / CV / VC</text>
  <text x="337" y="580" class="small">ds006104, ds004408</text>

  <rect x="560" y="500" width="205" height="92" class="box"/>
  <text x="582" y="532" class="text">VoiceProfileHead</text>
  <text x="582" y="558" class="small">pitch / timbre</text>
  <text x="582" y="580" class="small">speaker / style</text>

  <rect x="805" y="500" width="235" height="92" class="box"/>
  <text x="827" y="532" class="text">SegmentContrastiveHead</text>
  <text x="827" y="558" class="small">EEG-audio retrieval</text>
  <text x="827" y="580" class="small">ds005345 stream alignment</text>

  <rect x="1080" y="500" width="220" height="92" class="green"/>
  <text x="1102" y="532" class="text">Audio/content emb</text>
  <text x="1102" y="558" class="small">content + F0</text>
  <text x="1102" y="580" class="small">timbre + speaker</text>

  <path class="arrow" d="M190 166 H230"/>
  <path class="arrow" d="M420 166 H455"/>
  <path class="arrow" d="M660 166 H700"/>
  <path class="arrow" d="M935 166 H980"/>
  <path class="arrow" d="M1080 224 V278"/>
  <path class="arrow" d="M420 331 C540 331 610 228 700 197"/>
  <path class="arrow" d="M1080 224 C1070 300 950 322 895 330"/>
  <path class="arrow" d="M760 434 C620 470 350 462 172 500"/>
  <path class="arrow" d="M790 434 C670 470 520 470 417 500"/>
  <path class="arrow" d="M817 434 C760 470 700 470 662 500"/>
  <path class="arrow" d="M850 434 C875 470 900 470 922 500"/>
  <path class="arrow" d="M1080 546 H1040"/>
</svg>
