<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Audio Decoder Literature Map</title>
  <desc id="desc">A literature map connecting audio token representation, codec factorization, token completion, and acoustic realization for EEG-Voice.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#465766" />
    </marker>
    <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#8a99a8" />
    </marker>
    <style>
      .bg { fill: #f7f9fc; }
      .panel { fill: #ffffff; stroke: #d7dee8; stroke-width: 1.2; rx: 18; }
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; font-size: 32px; font-weight: 700; fill: #14202b; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; font-size: 16px; fill: #556575; }
      .stage { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; font-size: 15px; font-weight: 700; fill: #162331; }
      .stage-small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; font-size: 12px; fill: #617182; }
      .section { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; font-size: 19px; font-weight: 700; fill: #17222d; }
      .question { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; font-size: 13px; fill: #51616f; }
      .paper { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; font-size: 15px; font-weight: 700; fill: #17222d; }
      .paper-note { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; font-size: 12px; fill: #5b6876; }
      .card { fill: #ffffff; stroke: #d8e1ea; stroke-width: 1; rx: 10; }
      .green { fill: #eef9f2; stroke: #87c89d; }
      .gold { fill: #fff8e8; stroke: #e2bb5c; }
      .purple { fill: #f4f1ff; stroke: #a897e4; }
      .red { fill: #fff1f1; stroke: #d88a8a; }
      .stage-box { fill: #ffffff; stroke: #c9d4df; stroke-width: 1.25; rx: 14; }
      .stage-core { fill: #eef6ff; stroke: #7fb1df; stroke-width: 1.5; rx: 14; }
      .line { stroke: #465766; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #8a99a8; stroke-width: 1.2; fill: none; marker-end: url(#arrow-soft); }
      .dash { stroke: #9aa8b7; stroke-width: 1.2; stroke-dasharray: 6 7; fill: none; }
      .caption { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; font-size: 13px; fill: #627181; }
      .caption-strong { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif; font-size: 13px; font-weight: 700; fill: #273545; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="980" />
  <text class="title" x="60" y="58">Audio Decoder Literature Map</text>
  <text class="subtitle" x="60" y="86">Audio waveform -> token representation -> EEG alignment -> token completion -> waveform rendering</text>

  <rect class="panel" x="54" y="112" width="1492" height="190" />
  <text class="section" x="82" y="145">System Pathway</text>
  <text class="question" x="82" y="170">Representative literature is organized by its functional position in the audio-token decoder chain.</text>

  <rect class="stage-core" x="110" y="202" width="210" height="62" />
  <text class="stage" x="215" y="228" text-anchor="middle">Audio waveform</text>
  <text class="stage-small" x="215" y="249" text-anchor="middle">raw speech / voice</text>

  <rect class="stage-core" x="395" y="202" width="230" height="62" />
  <text class="stage" x="510" y="228" text-anchor="middle">AudioTokenBundle</text>
  <text class="stage-small" x="510" y="249" text-anchor="middle">semantic / prosody / voice / codec</text>

  <rect class="stage-core" x="710" y="202" width="240" height="62" />
  <text class="stage" x="830" y="228" text-anchor="middle">EEG-token alignment</text>
  <text class="stage-small" x="830" y="249" text-anchor="middle">V2: align stable high-level tokens</text>

  <rect class="stage-core" x="1035" y="202" width="240" height="62" />
  <text class="stage" x="1155" y="228" text-anchor="middle">Audio token completion</text>
  <text class="stage-small" x="1155" y="249" text-anchor="middle">V3: fill acoustic / codec detail</text>

  <rect class="stage-core" x="1360" y="202" width="150" height="62" />
  <text class="stage" x="1435" y="228" text-anchor="middle">Waveform</text>
  <text class="stage-small" x="1435" y="249" text-anchor="middle">renderer</text>

  <path class="line" d="M320 233 L390 233" />
  <path class="line" d="M625 233 L705 233" />
  <path class="line" d="M950 233 L1030 233" />
  <path class="line" d="M1275 233 L1355 233" />

  <path class="dash" d="M985 120 L985 292" />
  <text class="caption-strong" x="890" y="288">V2 alignment</text>
  <text class="caption-strong" x="1010" y="288">V3 decoder</text>

  <rect class="panel green" x="60" y="338" width="350" height="250" />
  <text class="section" x="88" y="372">1. Semantic Representation</text>
  <text class="question" x="88" y="397">audio-to-content units</text>
  <text class="question" x="88" y="417">for EEG content alignment（内容对齐）</text>

  <rect class="card" x="88" y="448" width="294" height="54" />
  <text class="paper" x="106" y="478">HuBERT</text>
  <text class="paper-note" x="106" y="493">hidden-unit prediction, content unit target</text>

  <rect class="card" x="88" y="520" width="294" height="48" />
  <text class="paper" x="106" y="550">SpeechT5</text>
  <text class="paper-note" x="106" y="564">speech/text shared representation</text>

  <rect class="panel gold" x="445" y="338" width="380" height="250" />
  <text class="section" x="473" y="372">2. Factorized Codec</text>
  <text class="question" x="473" y="397">waveform-to-codec tokenization</text>
  <text class="question" x="473" y="417">alignable codec vs residual detail（残差信息）</text>

  <rect class="card" x="473" y="448" width="324" height="48" />
  <text class="paper" x="491" y="477">NaturalSpeech 3 / FACodec</text>
  <text class="paper-note" x="491" y="491">content / prosody / timbre / detail factorization</text>

  <rect class="card" x="473" y="512" width="324" height="48" />
  <text class="paper" x="491" y="541">X-Codec</text>
  <text class="paper-note" x="491" y="555">semantic-enhanced codec, codec semantic constraint</text>

  <rect class="card" x="473" y="576" width="324" height="48" />
  <text class="paper" x="491" y="605">RVQGAN</text>
  <text class="paper-note" x="491" y="619">residual quantization, V3 renderer reference</text>

  <rect class="panel purple" x="860" y="338" width="390" height="308" />
  <text class="section" x="888" y="372">3. Audio Token LM / Decoder</text>
  <text class="question" x="888" y="397">EEG-conditioned high-level tokens</text>
  <text class="question" x="888" y="417">to renderable audio tokens（可渲染 token）</text>

  <rect class="card" x="888" y="448" width="334" height="48" />
  <text class="paper" x="906" y="477">AudioLM</text>
  <text class="paper-note" x="906" y="491">semantic token LM + acoustic token LM</text>

  <rect class="card" x="888" y="512" width="334" height="48" />
  <text class="paper" x="906" y="541">VoiceCraft</text>
  <text class="paper-note" x="906" y="555">codec token infilling for incomplete conditions</text>

  <rect class="card" x="888" y="576" width="334" height="48" />
  <text class="paper" x="906" y="605">StreamSpeech</text>
  <text class="paper-note" x="906" y="619">streaming content-to-unit decoding</text>

  <rect class="card" x="888" y="640" width="334" height="48" />
  <text class="paper" x="906" y="669">UniAudio</text>
  <text class="paper-note" x="906" y="683">general audio token foundation interface</text>

  <rect class="panel red" x="1285" y="338" width="260" height="250" />
  <text class="section" x="1313" y="372">4. Voice Realization</text>
  <text class="question" x="1313" y="397">speaker / timbre / style / prosody</text>
  <text class="question" x="1313" y="417">to acoustic output（声学实现）</text>

  <rect class="card" x="1313" y="448" width="204" height="52" />
  <text class="paper" x="1331" y="478">StyleTTS 2</text>
  <text class="paper-note" x="1331" y="493">style diffusion, voice control</text>

  <rect class="card" x="1313" y="518" width="204" height="52" />
  <text class="paper" x="1331" y="548">DASpeech</text>
  <text class="paper-note" x="1331" y="563">linguistic-to-acoustic decoder split</text>

  <path class="line-soft" d="M410 470 C450 410, 465 328, 510 266" />
  <path class="line-soft" d="M635 338 C625 316, 590 292, 550 266" />
  <path class="line-soft" d="M1060 338 C1080 310, 1115 285, 1155 266" />
  <path class="line-soft" d="M1415 338 C1425 312, 1432 290, 1435 266" />

  <rect class="panel" x="60" y="705" width="1485" height="182" />
  <text class="section" x="88" y="740">Functional Interpretation</text>
  <text class="caption-strong" x="88" y="775">Token target:</text>
  <text class="caption" x="190" y="775">HuBERT and SpeechT5 define semantic representation; NaturalSpeech 3 and X-Codec define factorized codec targets.</text>
  <text class="caption-strong" x="88" y="812">Decoder path:</text>
  <text class="caption" x="190" y="812">AudioLM and VoiceCraft model high-level-to-codec token completion; StreamSpeech and UniAudio extend this path to streaming and universal audio generation.</text>
  <text class="caption-strong" x="88" y="849">Acoustic realization:</text>
  <text class="caption" x="232" y="849">StyleTTS 2 and DASpeech map speaker, style, prosody, and linguistic structure into acoustic output.</text>

  <text class="subtitle" x="60" y="932">Literature set: HuBERT, SpeechT5, NaturalSpeech 3 / FACodec, X-Codec, RVQGAN, AudioLM, VoiceCraft, StreamSpeech, UniAudio, StyleTTS 2, DASpeech</text>
</svg>
