<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#536678"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #4b5563; }
      .stageTitle { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #111827; }
      .stageSub { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #374151; }
      .paper { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #1f2937; }
      .detail { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #4b5563; }
      .note { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #6b7280; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 12; }
      .input { fill: #111827; stroke: #111827; rx: 14; }
      .output { fill: #0f766e; stroke: #0f766e; rx: 14; }
      .inputText { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #ffffff; }
      .label { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #ffffff; letter-spacing: .4px; }
      .pillA { fill: #2563eb; }
      .pillB { fill: #059669; }
      .pillC { fill: #d97706; }
      .pillD { fill: #7c3aed; }
      .pillE { fill: #be123c; }
      .line { stroke: #536678; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .softLine { stroke: #94a3b8; stroke-width: 1.6; stroke-dasharray: 5 5; fill: none; marker-end: url(#arrow); }
      .constraint { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.3; rx: 12; }
      .renderer { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 1.3; rx: 12; }
      .bridge { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.3; rx: 12; }
      .seq { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.3; rx: 12; }
      .voice { fill: #fffbeb; stroke: #fcd34d; stroke-width: 1.3; rx: 12; }
    </style>
  </defs>

  <rect width="1500" height="980" class="bg"/>
  <text x="54" y="58" class="title">Audio Decoder Literature Map for EEG Voice Reconstruction</text>
  <text x="56" y="86" class="subtitle">Functional view of CCF-A audio decoder papers: representation bridge, token generation, voice-profile control, waveform rendering, and content-acoustic disentanglement.</text>

  <rect x="58" y="180" width="160" height="96" class="input"/>
  <text x="138" y="218" text-anchor="middle" class="inputText">EEG</text>
  <text x="138" y="244" text-anchor="middle" class="inputText">discrete tokens</text>
  <text x="138" y="266" text-anchor="middle" class="note" fill="#d1d5db">from EEG tokenizer</text>

  <rect x="1260" y="180" width="180" height="96" class="output"/>
  <text x="1350" y="218" text-anchor="middle" class="inputText">Voice audio</text>
  <text x="1350" y="244" text-anchor="middle" class="inputText">output</text>
  <text x="1350" y="266" text-anchor="middle" class="note" fill="#d1fae5">content + voice image</text>

  <path d="M218 228 L292 228" class="line"/>
  <path d="M542 228 L616 228" class="line"/>
  <path d="M866 228 L940 228" class="line"/>
  <path d="M1190 228 L1260 228" class="line"/>

  <rect x="292" y="132" width="250" height="192" class="box bridge"/>
  <rect x="312" y="154" width="28" height="22" rx="6" class="pillA"/>
  <text x="326" y="170" text-anchor="middle" class="label">A</text>
  <text x="352" y="171" class="stageTitle">Representation Bridge</text>
  <text x="312" y="199" class="stageSub">Map EEG tokens into audio space</text>
  <text x="318" y="232" class="paper">SpeechT5</text>
  <text x="318" y="250" class="detail">shared speech-text interface</text>
  <text x="318" y="279" class="paper">X-Codec</text>
  <text x="318" y="297" class="detail">semantic-enhanced codec</text>

  <rect x="616" y="132" width="250" height="192" class="box seq"/>
  <rect x="636" y="154" width="28" height="22" rx="6" class="pillB"/>
  <text x="650" y="170" text-anchor="middle" class="label">B</text>
  <text x="676" y="171" class="stageTitle">TokenSeq Generator</text>
  <text x="636" y="199" class="stageSub">Generate codec / unit token sequence</text>
  <text x="642" y="232" class="paper">VoiceCraft / VoiceCraft-X</text>
  <text x="642" y="250" class="detail">codec-token infilling and cloning</text>
  <text x="642" y="279" class="paper">StreamSpeech / UniAudio</text>
  <text x="642" y="297" class="detail">unit prediction and audio token LM</text>

  <rect x="940" y="132" width="250" height="192" class="box voice"/>
  <rect x="960" y="154" width="28" height="22" rx="6" class="pillC"/>
  <text x="974" y="170" text-anchor="middle" class="label">C</text>
  <text x="1000" y="171" class="stageTitle">Voice-Profile Control</text>
  <text x="960" y="199" class="stageSub">Control timbre,pitch,speaker,prosody</text>
  <text x="966" y="232" class="paper">StyleTTS 2</text>
  <text x="966" y="250" class="detail">style latent and diffusion</text>
  <text x="966" y="279" class="paper">P-Flow / CoMoSpeech</text>
  <text x="966" y="297" class="detail">prompt conditioning and fast synthesis</text>

  <path d="M1065 324 C1065 385, 1055 422, 1042 468" class="softLine"/>
  <path d="M742 324 C742 385, 750 422, 772 468" class="softLine"/>
  <path d="M417 324 C417 430, 526 520, 640 555" class="softLine"/>

  <rect x="384" y="458" width="320" height="214" class="constraint"/>
  <rect x="408" y="482" width="28" height="22" rx="6" class="pillE"/>
  <text x="422" y="498" text-anchor="middle" class="label">E</text>
  <text x="448" y="499" class="stageTitle">Cont-Acous Disentanglement</text>
  <text x="408" y="528" class="stageSub">Separate "what is said" from "how it sounds"</text>
  <text x="414" y="566" class="paper">DASpeech</text>
  <text x="414" y="584" class="detail">linguistic decoder + acoustic decoder</text>
  <text x="414" y="615" class="paper">NaturalSpeech 3</text>
  <text x="414" y="633" class="detail">content / prosody / timbre / detail factors</text>
  <text x="414" y="660" class="note">Constraint for branch design and loss separation</text>

  <rect x="796" y="458" width="320" height="214" class="renderer"/>
  <rect x="820" y="482" width="28" height="22" rx="6" class="pillD"/>
  <text x="834" y="498" text-anchor="middle" class="label">D</text>
  <text x="860" y="499" class="stageTitle">Waveform Renderer</text>
  <text x="820" y="528" class="stageSub">Render tokens into high-fidelity waveform</text>
  <text x="826" y="566" class="paper">RVQGAN</text>
  <text x="826" y="584" class="detail">RVQ + GAN codec decoder</text>
  <text x="826" y="615" class="paper">ESC</text>
  <text x="826" y="633" class="detail">cross-scale RVQ Transformer</text>
  <text x="826" y="660" class="note">Final neural codec or acoustic decoder endpoint</text>

  <path d="M1116 324 C1190 390, 1206 475, 1116 565" class="softLine"/>
  <path d="M704 565 L796 565" class="line"/>
  <path d="M1116 565 C1190 510, 1240 395, 1328 276" class="line"/>

  <rect x="112" y="760" width="1276" height="132" fill="#ffffff" stroke="#d1d5db" stroke-width="1.2" rx="14"/>
  <text x="142" y="794" class="stageTitle">Reading the map</text>
  <text x="142" y="826" class="detail">1. EEG side: train a stable discrete tokenizer and produce content-like, voice-like, and audio-token-aligned representations.</text>
  <text x="142" y="855" class="detail">2. Decoder side: choose a bridge space first, then generate token sequences, condition voice profile, and render waveform.</text>
  <text x="142" y="884" class="detail">3. Disentanglement is not an optional decoration: it defines separate losses for content, prosody, timbre, speaker identity, and acoustic detail.</text>
</svg>
