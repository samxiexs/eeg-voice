<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="560" viewBox="0 0 1220 560">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #111827; stroke-width: 1.4; rx: 8; }
      .blue { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 1.4; rx: 8; }
      .green { fill: #ecfdf5; stroke: #047857; stroke-width: 1.4; rx: 8; }
      .orange { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.4; rx: 8; }
      .text { font-family: Arial, Helvetica, sans-serif; font-size: 17px; fill: #111827; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#111827" />
    </marker>
  </defs>

  <text x="40" y="42" class="text" font-weight="700">Model v0.1 code modules</text>
  <text x="40" y="66" class="small">Tokenizer remains standalone; v0.1 wrapper attaches downstream token-evaluation heads.</text>

  <rect x="60" y="115" width="210" height="92" class="blue"/>
  <text x="82" y="148" class="text">builders.py</text>
  <text x="82" y="174" class="small">build tokenizer v0</text>
  <text x="82" y="194" class="small">build token-centric v0.1</text>

  <rect x="330" y="115" width="225" height="92" class="green"/>
  <text x="352" y="148" class="text">tokenizer.py</text>
  <text x="352" y="174" class="small">EEG -> RVQ tokens</text>
  <text x="352" y="194" class="small">optional overlap tokenize</text>

  <rect x="615" y="80" width="240" height="165" class="orange"/>
  <text x="637" y="113" class="text">modules.py</text>
  <text x="637" y="139" class="small">SensorEmbedding</text>
  <text x="637" y="159" class="small">SEANet blocks</text>
  <text x="637" y="179" class="small">Backward/ForwardSolution</text>
  <text x="637" y="199" class="small">LatentQueryAggregator</text>
  <text x="637" y="219" class="small">RVQ + decoder</text>

  <rect x="915" y="115" width="235" height="92" class="box"/>
  <text x="937" y="148" class="text">voice_model.py</text>
  <text x="937" y="174" class="small">TokenCentricEEGVoiceModelV01</text>
  <text x="937" y="194" class="small">wrapper around tokenizer</text>

  <rect x="160" y="335" width="245" height="126" class="box"/>
  <text x="182" y="368" class="text">heads.py</text>
  <text x="182" y="394" class="small">PhonemeSequenceHead</text>
  <text x="182" y="414" class="small">SegmentContrastiveHead</text>
  <text x="182" y="434" class="small">VoiceProfileHead + TokenMetrics</text>

  <rect x="485" y="335" width="220" height="126" class="box"/>
  <text x="507" y="368" class="text">losses.py</text>
  <text x="507" y="394" class="small">token reconstruction</text>
  <text x="507" y="414" class="small">PCC / frequency</text>
  <text x="507" y="434" class="small">InfoNCE</text>

  <rect x="785" y="335" width="245" height="126" class="box"/>
  <text x="807" y="368" class="text">dry-run / tests</text>
  <text x="807" y="394" class="small">--model v0</text>
  <text x="807" y="414" class="small">--model v01</text>
  <text x="807" y="434" class="small">synthetic token branches</text>

  <path class="arrow" d="M270 161 H330"/>
  <path class="arrow" d="M555 161 H615"/>
  <path class="arrow" d="M855 161 H915"/>
  <path class="arrow" d="M1032 207 C1032 280 820 300 705 335"/>
  <path class="arrow" d="M1032 207 C970 280 760 300 595 335"/>
  <path class="arrow" d="M1032 207 C840 280 520 300 282 335"/>
</svg>
