# KaraOne v10 final semantic-first pipeline.
# v10 keeps the v9.1 Channel-MoE architecture, but optimizes the observed
# failure modes: zero/mean-prior reliance, negative cross-subject same-label
# gain, low prompt accuracy, and representation collapse.

data:
  root: ../data/karaone
  stages: overt_like
  subject_val: P02
  subject_test: MM21
  eeg_len: 1280
  train_split: subject_train

cache:
  semantic: ../artifacts/audio_targets/karaone_trial_hubert.npz
  semantic_tokens: ../artifacts/audio_targets/karaone_trial_hubert_tokens_k64_trainonly.npz
  codec: ../artifacts/audio_targets/karaone_trial_encodec_latents.npz
  prosody: ../artifacts/audio_targets/karaone_temporal_elastic_core_v5.npz
  canonical_manifest: ../artifacts/audio_targets/karaone_v9_canonical_manifest_overt_like.json
  cluster_bank: ../artifacts/audio_targets/karaone_v10_clusters_overt_like.npz
  cluster_audit: ../artifacts/audio_targets/karaone_v10_cluster_audit_overt_like.json

clusters:
  n_eeg_clusters: 12
  n_speech_clusters: 12
  n_cross_clusters: 16
  cluster_balanced_sampler: true

model:
  n_channels_eeg: 62
  patch_size: 32
  patch_stride: 16
  d_model: 128
  num_layers: 4
  num_heads: 4
  dropout: 0.15
  channel_dropout: 0.12
  cond_dim: 32
  channel_experts: 6
  channel_top_k: 16
  channel_desc_dim: 32
  channel_embedding_dim: 16
  moe_temperature: 0.7
  shared_dim: 128
  domain_dim: 64
  transport_layers: 2
  transport_heads: 4
  heun_steps: 32

train:
  batch_size: 32
  lr: 0.0003
  weight_decay: 0.001
  epochs: 50
  seed: 7
  grad_clip: 1.0
  mask_ratio: 0.25
  lambda_seq_ot: 1.0
  lambda_seq_cos: 0.5
  lambda_global_nce: 0.5
  lambda_soft_nce: 0.5
  lambda_cluster_nce: 0.25
  lambda_hard_negative: 0.15
  lambda_semantic_token: 0.3
  lambda_ctc: 0.2
  lambda_prompt: 0.18
  lambda_prompt_balanced: 0.20
  lambda_prosody: 0.5
  lambda_subject_adv: 0.10
  lambda_coral: 0.05
  lambda_group_dro: 0.20
  lambda_variance: 0.12
  lambda_gate_consistency: 0.05
  lambda_channel_balance: 0.05
  lambda_gate_sparsity: 0.02
  lambda_gate_entropy: 0.02
  lambda_domain_subject: 0.05
  lambda_content_domain_orth: 0.02
  lambda_eeg_specific_margin: 0.30
  lambda_mean_prior_margin: 0.20
  lambda_cross_subject_semantic: 0.35
  lambda_label_prototype_pull: 0.10
  lambda_pairwise_decorrelation: 0.05
  semantic_margin: 0.04
  cross_subject_temperature: 0.06
  nce_temperature: 0.07
  soft_target_temperature: 0.08
  early_stop_patience: 0

transport:
  epochs: 10
  lr: 0.0002
  weight_decay: 0.0005
  lambda_flow: 1.0
  lambda_condition_semantic: 0.2
  lambda_codec_consistency: 0.2
  lambda_boundary_continuity: 0.05
  scheduled_teacher_ratio: 0.0
  sample_steps: 32

synthesis:
  sample_rate: 16000
  duration_sec: 2.0
  limit: 12
  mode: retrieval_diagnostic
  reconstruction_type: pred_env_scaled

output:
  root: ../artifacts/outputs_karaone
  prefix: karaone_v10_final

