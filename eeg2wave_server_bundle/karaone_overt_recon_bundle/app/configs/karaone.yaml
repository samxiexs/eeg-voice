# KaraOne trial-synchronous EEG -> waveform reconstruction.
data:
  root: ../data/karaone
  target_cache: ../artifacts/audio_targets/karaone_trial_encodec_latents.npz
  stages: overt_like
  split_protocol: trial
  heldout_subjects: [P02, MM21]
  eeg_len: 1280

audio:
  sample_rate: 16000
  duration_sec: 2.0
  normalize: rms
  target_rms: 0.08
  max_gain: 10.0

targets:
  backend: encodec_latent
  target_kind: encodec_latent
  codec_model_name_or_path: ../models/encodec_24khz
  codec_bandwidth: 6.0
  local_files_only: true

# Acoustic target representation (switch). mel = log-mel + Griffin-Lim vocoder
# (offline, scipy-only, default). encodec_latent = EnCodec continuous latent.
target:
  kind: mel                  # mel | encodec_latent
  cache_mel: ../artifacts/audio_targets/karaone_trial_mel.npz
  cache_encodec: ../artifacts/audio_targets/karaone_trial_encodec_latents.npz
  n_mels: 80
  mel_n_fft: 1024
  mel_hop: 256
  # WS3 HuBERT semantic AUXILIARY target (content head + retrieval metrics). The
  # mel/encodec target above still renders audio; HuBERT has no offline vocoder.
  # Build once: python scripts/extract_karaone_targets.py --target hubert_sequence
  cache_hubert: ../artifacts/audio_targets/karaone_trial_hubert.npz
  hubert_ssl_path: ../../feis_subject_aware_bundle/models/hubert-base-ls960
  hubert_steps: 50

# WS1 cross-subject domain adaptation. instance_norm = per-trial RevIN (no subject id);
# adversarial = subject-DANN (uses subject id at TRAIN time only, to REMOVE it).
# Inference stays subject-agnostic. Set both false to reproduce the old behavior.
domain_adapt:
  instance_norm: true
  adversarial: true
  lambda_domain_adv: 0.1     # DANN gradient-reversal strength (ramped 0 -> this)

vocoder:
  kind: griffinlim           # griffinlim (mel) | encodec (latent)
  griffinlim_iters: 100      # fast (momentum) Griffin-Lim; more iters = fewer "bubbling" artifacts
  griffinlim_momentum: 0.99

model:
  n_channels_eeg: 62
  d_model: 256
  cond_dim: 64
  content_dim: 128
  speaker_dim: 64
  num_blocks: 6
  kernel_size: 5
  channel_dropout: 0.15
  dropout: 0.15
  num_experts: 1            # output head: 1 = plain MLP (MoE moved to encoder)
  num_channel_experts: 4    # encoder channel-selection/clustering MoE (used by --model moe)
  decoder: regression       # regression (train_karaone_recon.py) | diffusion (train_karaone_diffusion.py)

train:
  batch_size: 48
  lr: 0.0003
  weight_decay: 0.001
  epochs: 120
  grad_clip: 1.0
  num_workers: 0
  seed: 7
  lambda_recon_cos: 1.0
  lambda_recon_mse: 0.5
  lambda_content_ce: 0.5
  lambda_supcon: 0.5
  lambda_proto: 0.25
  lambda_log_rms: 0.2
  lambda_std: 0.1            # WS2a: turn on per-dim std matching (anti-collapse, std_ratio->1)
  lambda_energy_env: 0.3    # WS2a: energy-envelope correlation (fights RMS/energy collapse)
  lambda_multiscale_mel: 0.3  # WS2a: multi-resolution temporal L1 (fights over-smoothing)
  lambda_hubert_aux: 0.3    # WS3: HuBERT feature regression (0 if no hubert cache)
  lambda_hubert_clip: 0.3   # WS3: EEG<->HuBERT-summary symmetric InfoNCE
  early_stop_patience: 15   # WS1c: stop after N epochs without val-gain gain (0 disables)
  lambda_router_balance: 0.01
  lambda_channel_balance: 0.01
  lambda_clip: 0.5            # EEG<->audio contrastive alignment (Defossez 2022); set 0 to disable
  lambda_dtw: 1.0            # DTW-aligned reconstruction (NeuroTalk); handles cross-trial onset jitter; 0 disables
  lambda_gan: 0.0            # adversarial anti-collapse (regression head); set >0 (e.g. 0.1) to enable
  supcon_temperature: 0.1
  clip_temperature: 0.07
  dtw_band: 0.2             # Sakoe-Chiba band as fraction of T (speed)
  feat_match: 2.0          # GAN feature-matching weight (when lambda_gan>0)

# Generative path: EEG-conditioned latent diffusion (escapes the regression
# model's mean-collapse). Used by train/synthesize_karaone_diffusion.py.
diffusion:
  mode: diffusion        # diffusion (DDPM+DDIM) | flow (conditional flow matching, NeuroSonic/Voicebox)
  hidden: 256
  num_blocks: 6
  cond_ch: 128
  timesteps: 1000
  ddim_steps: 50         # sampling/ODE steps at synthesis time (flow needs fewer, e.g. 16)
  eval_steps: 20         # fewer steps during per-epoch eval (speed)
  schedule: cosine
  x0_clip: 8.0
  num_channel_experts: 4  # encoder channel-MoE when --model moe
  lr: 0.0003
  weight_decay: 0.0001
  epochs: 60

output:
  root: ../artifacts/outputs_karaone

