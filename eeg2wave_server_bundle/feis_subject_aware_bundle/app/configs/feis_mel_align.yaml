# EEG-only FEIS mel-alignment generation.
# Valid model input: EEG only. No stage, speaker, or identity metadata is used.
data:
  root: ../data/feis
  target_cache: ../artifacts/audio_targets/feis_label_mel_banks.npz
  include_anomalous: false

audio:
  sample_rate: 16000
  duration_sec: 1.0
  normalize: rms
  target_rms: 0.08
  max_gain: 12.0

target:
  kind: mel                  # mel | encodec_latent
  policy: label_bank_softmin
  cache_mel: ../artifacts/audio_targets/feis_label_mel_banks.npz
  cache_encodec: ../artifacts/audio_targets/feis_label_encodec_banks.npz
  cache_encodec_source: ../artifacts/audio_targets/feis_templates_encodec_latents.npz
  n_mels: 80
  n_fft: 1024
  hop_length: 256
  target_frames: 64
  f_min: 50.0
  f_max: 7600.0
  max_refs_per_label: 20

input:
  use_stage_idx: false

model:
  n_channels_eeg: 14
  d_model: 192
  cond_dim: 16
  num_blocks: 5
  kernel_size: 5
  num_heads: 6
  num_cross_layers: 2
  ff_mult: 4
  channel_moe: true
  moe_num_experts: 4
  moe_top_k: 2
  channel_dropout: 0.2
  dropout: 0.2
  decoder: regression         # regression | diffusion

loss:
  dtw: true
  gan: false
  lambda_dtw: 1.0
  lambda_content_ce: 0.75
  lambda_contrastive: 0.25
  lambda_log_rms: 0.1
  lambda_moe_load_balance: 0.05
  lambda_moe_sparsity: 0.005
  lambda_moe_route_entropy: 0.01
  lambda_moe_cluster: 0.05
  lambda_std: 0.1            # anti-collapse: match per-dim temporal std of the label-bank mean
  lambda_energy: 0.1        # anti-collapse: match temporal energy-envelope spread (fights flat mel)
  lambda_gan: 0.0
  lambda_feat_match: 2.0
  dtw_band: 10
  dtw_top_k: 3
  contrast_temperature: 0.07

diffusion:
  enabled: false
  mode: diffusion        # diffusion (DDPM+DDIM) | flow (conditional flow matching, NeuroSonic/Voicebox)
  num_steps: 200
  sample_steps: 24
  eval_steps: 8
  d_model: 192
  num_layers: 2
  num_heads: 4
  ff_mult: 4
  dropout: 0.1
  beta_start: 0.0001
  beta_end: 0.02
  lambda_diffusion: 1.0

train:
  batch_size: 64
  lr: 0.0003
  weight_decay: 0.001
  epochs: 40
  grad_clip: 1.0
  num_workers: 0
  seed: 7

vocoder:
  kind: griffinlim           # griffinlim | encodec
  iters: 48
  encodec_model_name_or_path: ../models/encodec_24khz
  encodec_local_files_only: true

output:
  root: ../artifacts/outputs_mel
