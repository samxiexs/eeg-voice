data:
  root: ../data/feis
  stage: thinking
  protocol: G
  subject_id: 1
  holdout_subject_id: 21
  include_anomalous: false
  ablation_mode: none

audio:
  sample_rate: 16000
  duration_sec: 1.0
  normalize: rms
  target_rms: 0.08
  max_gain: 10.0

targets:
  cache_path: ../artifacts/audio_targets/feis_subject_templates_encodec_latents.npz
  backend: encodec_latent
  target_kind: encodec_latent
  ssl_model_name_or_path: ../models/hubert-base-ls960
  codec_model_name_or_path: ../models/encodec_24khz
  local_files_only: true
  spectral_bins: 48
  sequence_target_steps: 16
  codec_bandwidth: 6.0

model:
  n_channels_eeg: 14
  hidden_dim: 96
  latent_dim: 192
  use_label_head: false
  use_prosody_head: false
  use_subject_demo_head: false
  subject_embedding_dim: 64

train:
  batch_size: 32
  lr: 0.0002
  weight_decay: 0.0001
  epochs: 80
  grad_clip: 1.0
  num_workers: 0
  seed: 7
  lambda_seq_cosine: 1.0
  lambda_seq_mse: 0.5
  lambda_contrastive: 1.0
  lambda_prosody: 0.0
  lambda_cls: 0.0
  contrastive_temperature: 0.07

output:
  root: ../artifacts/outputs_alignment
  run_suffix: encodec_latent

eval:
  top_k: 5
