# v4 multi-dataset config (see NEW_DESIGN_multidataset_v4.md).
# Switch datasets here or via --datasets feis,karaone on the CLI.

datasets: [feis]              # [feis] | [karaone] | [feis, karaone]
sampling_weights: [1.0, 1.0]  # per-dataset batch sampling weight (joint mode)

model:
  d_model: 256
  cond_dim: 64                # subject + dataset FiLM conditioning dim
  num_blocks: 5
  kernel_size: 5
  channel_dropout: 0.1
  dropout: 0.1
  embed_dim: 128
  target_steps: 150           # common EnCodec-frame window (~2.0s); FEIS padded+masked

train:
  batch_size: 32
  lr: 0.0002
  weight_decay: 0.0001
  epochs: 120
  grad_clip: 1.0
  num_workers: 0
  seed: 7
  lambda_contrastive: 1.0
  lambda_latent_cosine: 1.0
  lambda_latent_mse: 0.5
  lambda_cls: 0.5
  contrastive_temperature: 0.07

output:
  root: ../artifacts/outputs_v4

eval:
  top_k: 5
