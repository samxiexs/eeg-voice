data:
  root: data/feis
  stage: thinking
  protocol: G
  subject_id: 01
  holdout_subject_id: 21
  include_anomalous: false
  ablation_mode: none

audio:
  sample_rate: 16000
  duration_sec: 1.0
  n_samples: 16000
  normalize: rms
  target_rms: 0.08
  max_gain: 10.0

model:
  n_channels_eeg: 14
  hidden_dim: 96
  codebook_size: 64
  vq_beta: 0.25
  vq_decay: 0.95
  use_subject_conditioning: false
  subject_embedding_dim: 64

train:
  batch_size: 32
  lr: 0.0002
  weight_decay: 0.0001
  epochs: 80
  lambda_stft: 0.75
  lambda_log_stft: 0.2
  lambda_rms: 0.8
  lambda_envelope: 1.5
  lambda_vq: 0.1
  lambda_cls: 0.25
  grad_clip: 1.0
  num_workers: 0
  seed: 7

output:
  root: outputs_waveform_protocol
