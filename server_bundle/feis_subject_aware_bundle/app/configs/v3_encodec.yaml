# v3 EEG -> EnCodec-latent -> frozen EnCodec decoder config.
# See NEW_DESIGN_eeg2speech_v3.md.

data:
  root: ../data/feis
  stage: thinking            # P1 uses speaking; P2 uses thinking
  protocol: G                # G pooled (default) | S subject | U holdout
  subject_id: 1              # Protocol S only
  holdout_subject_id: 21     # Protocol U only
  include_anomalous: false

audio:
  sample_rate: 16000
  duration_sec: 1.0

targets:
  cache_path: ../artifacts/audio_targets/feis_subject_templates_encodec_latents.npz
  codec_model_name_or_path: ../models/encodec_24khz
  codec_bandwidth: 6.0
  local_files_only: true

model:
  n_channels_eeg: 14
  d_model: 256
  cond_dim: 64               # subject-embedding / FiLM conditioning dim
  num_blocks: 5
  kernel_size: 5
  channel_dropout: 0.1       # whole-electrode dropout (augmentation)
  dropout: 0.1
  embed_dim: 128             # contrastive projection (matches EnCodec latent dim)

train:
  batch_size: 32
  lr: 0.0002
  weight_decay: 0.0001
  epochs: 120
  grad_clip: 1.0
  num_workers: 0
  seed: 7
  # Objective weights. Goal = reconstruct THIS subject's own waveform, so latent
  # reconstruction (cosine+MSE to the subject-specific EnCodec target) is primary;
  # contrastive + cls are kept smaller purely as anti-collapse / discriminative aids.
  lambda_latent_cosine: 1.0
  lambda_latent_mse: 1.0
  lambda_contrastive: 0.5
  lambda_cls: 0.3
  contrastive_temperature: 0.07
  # Optional cross-stage knowledge distillation (P2 only).
  lambda_kd_latent: 0.5
  lambda_kd_logits: 0.5

output:
  root: ../artifacts/outputs_v3
  run_suffix: v3

eval:
  top_k: 5
